name: Build iOS

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag or build label (e.g., v1.8.0)'
        required: true
        type: string

jobs:
  build-ios:
    runs-on: macos-15

    env:
      FLUTTER_VERSION: '3.41.9'
      ARTIFACT_DIR: 'ios-artifacts'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        shell: bash
        run: |
          mkdir -p "$ARTIFACT_DIR"
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::No unsigned Runner.app found at $APP_PATH"
            exit 1
          fi

          rm -rf build/ios/unsigned-ipa
          mkdir -p build/ios/unsigned-ipa/Payload
          cp -R "$APP_PATH" build/ios/unsigned-ipa/Payload/Runner.app
          ditto -c -k --sequesterRsrc build/ios/unsigned-ipa/Payload "$ARTIFACT_DIR/zc_bangumi-${{ github.event.inputs.release_tag }}-ios-unsigned.ipa"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-${{ github.event.inputs.release_tag }}
          path: ${{ env.ARTIFACT_DIR }}/*

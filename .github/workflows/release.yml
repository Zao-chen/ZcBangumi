name: Build and Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string
      release_title:
        description: 'Release title (optional, defaults to ZC Bangumi <tag>)'
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.inputs.release_tag }}
  cancel-in-progress: false

env:
  APP_DISPLAY_NAME: 'ZC Bangumi'
  ARTIFACT_PREFIX: 'zc_bangumi'
  FLUTTER_VERSION: '3.41.9'
  RELEASE_TAG: ${{ github.event.inputs.release_tag }}

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Validate Android signing secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for var in ANDROID_KEYSTORE_BASE64 ANDROID_STORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required GitHub Actions secret: $var"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare Android release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p android/keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/keystore/upload-keystore.jks

          cat > android/key.properties <<EOF
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=../keystore/upload-keystore.jks
          EOF

      - name: Verify Android signing certificate
        shell: bash
        env:
          ANDROID_CERT_SHA256: ${{ secrets.ANDROID_CERT_SHA256 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_CERT_SHA256" ]; then
            echo "ANDROID_CERT_SHA256 not set; skipping certificate fingerprint verification."
            exit 0
          fi

          actual_sha256=$(
            keytool -list -v \
              -keystore android/keystore/upload-keystore.jks \
              -alias "$ANDROID_KEY_ALIAS" \
              -storepass "$ANDROID_STORE_PASSWORD" \
              -keypass "$ANDROID_KEY_PASSWORD" \
              | awk -F': ' '/SHA256:/{gsub(/:/, "", $2); print toupper($2); exit}'
          )
          expected_sha256=$(echo "$ANDROID_CERT_SHA256" | tr -d '[:space:]:' | tr '[:lower:]' '[:upper:]')

          if [ -z "$actual_sha256" ]; then
            echo "::error::Unable to read SHA256 from Android keystore."
            exit 1
          fi

          if [ "$actual_sha256" != "$expected_sha256" ]; then
            echo "::error::Android signing certificate SHA256 mismatch."
            exit 1
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        shell: bash
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk "${ARTIFACT_PREFIX}-${RELEASE_TAG}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ env.ARTIFACT_PREFIX }}-${{ env.RELEASE_TAG }}.apk

  windows:
    name: Build Windows Installer
    runs-on: windows-2022
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Install NSIS
        run: |
          choco install nsis -y

      - name: Create NSIS installer script
        shell: pwsh
        run: |
          $appName = "${{ env.APP_DISPLAY_NAME }}"
          $artifactPrefix = "${{ env.ARTIFACT_PREFIX }}"
          $releaseTag = "${{ env.RELEASE_TAG }}"
          $nsisscript = @"
          `!include "MUI2.nsh"
          
          Name "$appName"
          OutFile "$artifactPrefix-$releaseTag-windows.exe"
          InstallDir "`$PROGRAMFILES\ZCBangumi"
          
          `!insertmacro MUI_PAGE_DIRECTORY
          `!insertmacro MUI_PAGE_INSTFILES
          `!insertmacro MUI_LANGUAGE "English"
          
          Section "Install"
            SetOutPath "`$INSTDIR"
            File /r "build\windows\x64\runner\Release\*.*"
            CreateDirectory "`$SMPROGRAMS\ZCBangumi"
            CreateShortCut "`$SMPROGRAMS\ZCBangumi\ZCBangumi.lnk" "`$INSTDIR\zc_bangumi.exe"
            CreateShortCut "`$SMPROGRAMS\ZCBangumi\Uninstall.lnk" "`$INSTDIR\Uninstall.exe"
          SectionEnd
          
          Section "Uninstall"
            RMDir /r "`$INSTDIR"
            RMDir /r "`$SMPROGRAMS\ZCBangumi"
          SectionEnd
          "@
          $nsisscript | Out-File -FilePath "installer.nsi" -Encoding UTF8

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: ${{ env.ARTIFACT_PREFIX }}-${{ env.RELEASE_TAG }}-windows.exe

  macos:
    name: Build macOS App (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: x64
          - runner: macos-15
            arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Package macOS DMG
        shell: bash
        run: |
          app_path=$(find build/macos/Build/Products/Release -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "$app_path" ]; then
            echo "::error::No .app bundle found in build/macos/Build/Products/Release"
            ls -la build/macos/Build/Products/Release || true
            exit 1
          fi

          app_name="${ARTIFACT_PREFIX}-${RELEASE_TAG}-macos-${{ matrix.arch }}.app"
          dmg_name="${ARTIFACT_PREFIX}-${RELEASE_TAG}-macos-${{ matrix.arch }}.dmg"
          rm -rf "$app_name"
          cp -R "$app_path" "$app_name"
          hdiutil create -volname "${APP_DISPLAY_NAME}" -srcfolder "$app_name" -ov -format UDZO "$dmg_name"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-dmg
          path: ${{ env.ARTIFACT_PREFIX }}-${{ env.RELEASE_TAG }}-macos-${{ matrix.arch }}.dmg

  ios:
    name: Build unsigned iOS IPA
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        shell: bash
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::No unsigned Runner.app found at $APP_PATH"
            exit 1
          fi

          rm -rf build/ios/unsigned-ipa
          mkdir -p build/ios/unsigned-ipa/Payload
          cp -R "$APP_PATH" build/ios/unsigned-ipa/Payload/Runner.app
          (
            cd build/ios/unsigned-ipa
            ditto -c -k --sequesterRsrc --keepParent Payload "${GITHUB_WORKSPACE}/${ARTIFACT_PREFIX}-${RELEASE_TAG}-ios-unsigned.ipa"
          )

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: ${{ env.ARTIFACT_PREFIX }}-${{ env.RELEASE_TAG }}-ios-unsigned.ipa

  release:
    name: Publish GitHub Release
    needs: [android, windows, macos, ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ github.event.inputs.release_title != '' && github.event.inputs.release_title || format('{0} {1}', env.APP_DISPLAY_NAME, env.RELEASE_TAG) }}
          files: |
            artifacts/android-apk/${{ env.ARTIFACT_PREFIX }}-${{ env.RELEASE_TAG }}.apk
            artifacts/windows-installer/${{ env.ARTIFACT_PREFIX }}-${{ env.RELEASE_TAG }}-windows.exe
            artifacts/macos-x64-dmg/${{ env.ARTIFACT_PREFIX }}-${{ env.RELEASE_TAG }}-macos-x64.dmg
            artifacts/macos-arm64-dmg/${{ env.ARTIFACT_PREFIX }}-${{ env.RELEASE_TAG }}-macos-arm64.dmg
            artifacts/ios-unsigned-ipa/${{ env.ARTIFACT_PREFIX }}-${{ env.RELEASE_TAG }}-ios-unsigned.ipa
          draft: false
          prerelease: false
          generate_release_notes: true

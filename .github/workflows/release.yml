name: Build and Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Validate Android signing secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for var in ANDROID_KEYSTORE_BASE64 ANDROID_STORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required GitHub Actions secret: $var"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare Android release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p android/keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/keystore/upload-keystore.jks

          cat > android/key.properties <<EOF
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=../keystore/upload-keystore.jks
          EOF

      - name: Verify Android signing certificate
        shell: bash
        env:
          ANDROID_CERT_SHA256: ${{ secrets.ANDROID_CERT_SHA256 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_CERT_SHA256" ]; then
            echo "ANDROID_CERT_SHA256 not set; skipping certificate fingerprint verification."
            exit 0
          fi

          actual_sha256=$(
            keytool -list -v \
              -keystore android/keystore/upload-keystore.jks \
              -alias "$ANDROID_KEY_ALIAS" \
              -storepass "$ANDROID_STORE_PASSWORD" \
              -keypass "$ANDROID_KEY_PASSWORD" \
              | awk -F': ' '/SHA256:/{gsub(/:/, "", $2); print toupper($2); exit}'
          )
          expected_sha256=$(echo "$ANDROID_CERT_SHA256" | tr -d '[:space:]:' | tr '[:lower:]' '[:upper:]')

          if [ -z "$actual_sha256" ]; then
            echo "::error::Unable to read SHA256 from Android keystore."
            exit 1
          fi

          if [ "$actual_sha256" != "$expected_sha256" ]; then
            echo "::error::Android signing certificate SHA256 mismatch."
            exit 1
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        shell: bash
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk zc_bangumi-${{ github.event.inputs.release_tag }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: zc_bangumi-${{ github.event.inputs.release_tag }}.apk

  build-windows:
    runs-on: windows-2022
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Install NSIS
        run: |
          choco install nsis -y

      - name: Create NSIS installer script
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.release_tag }}"
          $nsisscript = @"
          `!include "MUI2.nsh"
          
          Name "ZC Bangumi"
          OutFile "zc_bangumi-$tag-windows.exe"
          InstallDir "`$PROGRAMFILES\ZCBangumi"
          
          `!insertmacro MUI_PAGE_DIRECTORY
          `!insertmacro MUI_PAGE_INSTFILES
          `!insertmacro MUI_LANGUAGE "English"
          
          Section "Install"
            SetOutPath "`$INSTDIR"
            File /r "build\windows\x64\runner\Release\*.*"
            CreateDirectory "`$SMPROGRAMS\ZCBangumi"
            CreateShortCut "`$SMPROGRAMS\ZCBangumi\ZCBangumi.lnk" "`$INSTDIR\zc_bangumi.exe"
            CreateShortCut "`$SMPROGRAMS\ZCBangumi\Uninstall.lnk" "`$INSTDIR\Uninstall.exe"
          SectionEnd
          
          Section "Uninstall"
            RMDir /r "`$INSTDIR"
            RMDir /r "`$SMPROGRAMS\ZCBangumi"
          SectionEnd
          "@
          $nsisscript | Out-File -FilePath "installer.nsi" -Encoding UTF8

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: zc_bangumi-${{ github.event.inputs.release_tag }}-windows.exe

  release:
    needs: [build, build-windows]
    runs-on: ubuntu-latest
    if: ${{ needs.build.result == 'success' && needs.build-windows.result == 'success' }}
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Changelog
        id: changelog
        shell: bash
        run: |
          # 获取最后一个tag之后的提交信息
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            RAW_CHANGELOG=$(git log --format="%s" | head -20)
          else
            RAW_CHANGELOG=$(git log "$PREVIOUS_TAG"..HEAD --format="%s")
          fi

          # 移除 conventional commit 前缀（feat/fix/chore 等）并格式化成列表
          CHANGELOG=$(echo "$RAW_CHANGELOG" \
            | sed -E 's/^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)(\([^)]+\))?!?:[[:space:]]*//I' \
            | sed '/^[[:space:]]*$/d' \
            | sed 's/^/- /')

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- 本次发布未检测到可展示的提交说明"
          fi
          
          # 设置多行输出（使用 EOF delimiter 可直接保留换行符）
          {
            echo "CHANGELOG<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.event.inputs.release_tag }}
          files: |
            artifacts/app-release/zc_bangumi-${{ github.event.inputs.release_tag }}.apk
            artifacts/windows-release/zc_bangumi-${{ github.event.inputs.release_tag }}-windows.exe
          body: |
            ZC Bangumi ${{ github.event.inputs.release_tag }} 正式版本发布
            
            ## What's Changed
            ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: false
          generate_release_notes: false

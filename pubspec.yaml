name: zc_bangumi
description: "ZcBangumi - Bangumi 番组计划第三方客户端"
publish_to: 'none'
version: 1.2.2+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  provider: ^6.1.2
  shared_preferences: ^2.3.0
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.2
  path_provider: ^2.1.5
  flutter_local_notifications: ^18.0.1
  open_file: ^3.5.10
  permission_handler: ^11.3.1
  flutter_markdown: ^0.7.7+1
  flutter_inappwebview: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  linux:
    generate: true
  image_path: "assets/images/bangumi_icon.png"
  adaptive_icon_background: "#F09199"
  adaptive_icon_foreground: "assets/images/bangumi_icon.png"
  remove_alpha_ios: true
